<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>深圳子熙物流 - 司机端</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23667eea%22 width=%22100%22 height=%22100%22 rx=%2220%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22white%22>🚚</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;min-height:100vh;overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;color:#333;font-size:14px;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
        
        .login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:40px 30px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
        .login-box{width:100%;max-width:340px;background:#fff;border-radius:20px;padding:40px 30px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
        .login-logo{font-size:60px;text-align:center;margin-bottom:10px}
        .login-title{text-align:center;font-size:22px;font-weight:700;margin-bottom:6px}
        .login-sub{text-align:center;color:#999;font-size:13px;margin-bottom:30px}
        .ig{margin-bottom:18px}
        .ig label{display:block;font-size:13px;color:#666;margin-bottom:6px;font-weight:500}
        .ig input{width:100%;padding:14px 16px;border:1.5px solid #e8e8e8;border-radius:12px;font-size:15px;outline:none;background:#fafafa;transition:.2s}
        .ig input:focus{border-color:#667eea;background:#fff}
        .login-btn{width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px;transition:.1s}
        .login-btn:active{transform:scale(.98);opacity:.9}
        .login-tip{text-align:center;margin-top:20px;color:#999;font-size:12px}
        .login-tip a{color:#667eea;text-decoration:none}
        
        .main-page{display:none;min-height:100vh;min-height:100dvh;padding-bottom:80px}
        .header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px 16px 28px;padding-top:calc(20px + env(safe-area-inset-top));border-radius:0 0 24px 24px}
        .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .header-title{font-size:18px;font-weight:600}
        .header-avatar{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
        
        /* GPS状态栏 */
        .gps-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:12px;font-size:12px;margin-bottom:12px}
        .gps-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .gps-dot.on{background:#52c41a;box-shadow:0 0 6px #52c41a}
        .gps-dot.off{background:#ff4d4f}
        .gps-dot.searching{background:#faad14;animation:blink 1s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .gps-info{flex:1}
        .gps-info .addr{font-size:11px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
        
        .stats-row{display:flex;gap:10px}
        .stat-card{flex:1;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:14px;padding:12px;text-align:center}
        .stat-value{font-size:24px;font-weight:700;margin-bottom:2px}
        .stat-label{font-size:11px;opacity:.85}
        .content{padding:16px}
        .section-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
        .refresh-btn{font-size:12px;color:#667eea;font-weight:400;cursor:pointer;padding:4px 12px;background:#f0f2ff;border-radius:20px;border:none}
        .order-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.04);transition:.15s}
        .order-card:active{transform:scale(.99)}
        .order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .order-no{font-size:12px;color:#999;font-family:monospace}
        .order-status{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
        .sp{background:#fff3e0;color:#e65100}
        .sd{background:#e3f2fd;color:#1565c0}
        .sf{background:#e8f5e9;color:#2e7d32}
        .route-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
        .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
        .df{background:#ff6b6b}
        .dt{background:#51cf66}
        .rline{width:2px;height:18px;background:#e0e0e0;margin-left:4px}
        .rtext{flex:1}
        .raddr{font-size:13px;color:#333;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .rdetail{font-size:11px;color:#999}
        .ometa{display:flex;gap:14px;padding-top:12px;border-top:1px solid #f0f0f0;font-size:11px;color:#999;flex-wrap:wrap}
        .oactions{display:flex;gap:8px;margin-top:12px}
        .btn{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:4px;transition:.1s}
        .btn:active{transform:scale(.97)}
        .bo{background:#fff;border:1.5px solid #e0e0e0;color:#666}
        .bp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .bs{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#fff}
        
        .bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0f0f0;display:flex;justify-content:space-around;padding:6px 0 calc(10px + env(safe-area-inset-bottom));z-index:100}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 24px;color:#999;font-size:10px;cursor:pointer;transition:.2s;-webkit-user-select:none;user-select:none}
        .nav-item.active{color:#667eea}
        .nav-icon{font-size:20px}
        
        .mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
        .mo.show{display:flex}
        .mc{background:#fff;width:100%;max-width:500px;border-radius:24px 24px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));animation:su .3s ease}
        @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .mt{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center}
        .mb{width:100%;padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:600;margin-bottom:10px;cursor:pointer}
        .mbp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .mbc{background:#f5f5f5;color:#666}
        .sign-form{margin-bottom:16px}
        .sign-form label{display:block;font-size:13px;color:#666;margin-bottom:6px}
        .sign-form textarea{width:100%;padding:12px;border:1.5px solid #e8e8e8;border-radius:12px;font-size:14px;resize:none;outline:none;min-height:70px;background:#fafafa}
        .sign-form textarea:focus{border-color:#667eea;background:#fff}
        
        .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;z-index:300;display:none;pointer-events:none}
        .toast.show{display:block;animation:fi .2s}
        @keyframes fi{from{opacity:0}to{opacity:1}}
        
        .empty{text-align:center;padding:60px 20px;color:#999}
        .empty-icon{font-size:56px;margin-bottom:12px}
        .empty-text{font-size:14px}
        
        .loading{text-align:center;padding:20px;color:#999}
        .spinner{display:inline-block;width:24px;height:24px;border:3px solid #e0e0e0;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        /* 定位详情面板 */
        .loc-detail{background:rgba(255,255,255,.1);border-radius:12px;padding:10px 14px;margin-top:8px}
        .loc-detail div{font-size:11px;opacity:.85;line-height:1.6}
    </style>
</head>
<body>
<div class="login-page" id="lp">
    <div class="login-box">
        <div class="login-logo">🚚</div>
        <div class="login-title">深圳子熙物流</div>
        <div class="login-sub">司机端 - 智能配送 高效省心</div>
        <div class="ig"><label>手机号</label><input type="tel" id="un" placeholder="请输入手机号" value="18165730627"></div>
        <div class="ig"><label>密码</label><input type="password" id="pw" placeholder="请输入密码" value="123456"></div>
        <button class="login-btn" onclick="login()">登 录</button>
        <div class="login-tip">演示账号：18165730627 / 123456</div>
    </div>
</div>

<div class="main-page" id="mp">
    <div class="header">
        <div class="header-top">
            <div class="header-title">今日工作</div>
            <div class="header-avatar" onclick="showProfile()">👨‍💼</div>
        </div>
        
        <!-- GPS实时定位状态栏 -->
        <div class="gps-bar">
            <span class="gps-dot searching" id="gpsDot"></span>
            <div class="gps-info">
                <div id="gpsStatus">正在获取位置...</div>
                <div class="addr" id="gpsAddr">等待GPS信号</div>
            </div>
        </div>
        
        <!-- 定位详情 -->
        <div class="loc-detail" id="locDetail" style="display:none;">
            <div>📍 经度：<span id="locLng">-</span> | 纬度：<span id="locLat">-</span></div>
            <div>📡 精度：<span id="locAcc">-</span> | 🚗 速度：<span id="locSpeed">-</span></div>
            <div>🕐 上报状态：<span id="locReport">-</span></div>
        </div>
        
        <div class="stats-row">
            <div class="stat-card"><div class="stat-value" id="sP">-</div><div class="stat-label">待配送</div></div>
            <div class="stat-card"><div class="stat-value" id="sD">-</div><div class="stat-label">配送中</div></div>
            <div class="stat-card"><div class="stat-value" id="sF">-</div><div class="stat-label">已完成</div></div>
        </div>
    </div>
    <div class="content">
        <div class="section-title">
            📋 我的订单
            <button class="refresh-btn" onclick="loadOrders()">🔄 刷新</button>
        </div>
        <div id="ol">
            <div class="loading"><div class="spinner"></div><br>加载中...</div>
        </div>
    </div>
    <div class="bnav">
        <div class="nav-item active" onclick="tab('home')"><div class="nav-icon">📋</div><div>订单</div></div>
        <div class="nav-item" onclick="tab('loc')"><div class="nav-icon">📍</div><div>定位</div></div>
        <div class="nav-item" onclick="tab('msg')"><div class="nav-icon">🔔</div><div>消息</div></div>
        <div class="nav-item" onclick="tab('me')"><div class="nav-icon">👤</div><div>我的</div></div>
    </div>
</div>

<div class="mo" id="navM">
    <div class="mc">
        <div class="mt">🗺️ 选择导航</div>
        <button class="mb mbp" onclick="goNav('amap')">高德地图导航</button>
        <button class="mb mbp" style="background:linear-gradient(135deg,#2b99ff,#1e79e6)" onclick="goNav('baidu')">百度地图导航</button>
        <button class="mb mbp" style="background:linear-gradient(135deg,#34a853,#2d8f47)" onclick="goNav('tencent')">腾讯地图导航</button>
        <button class="mb mbc" onclick="closeMo('navM')">取消</button>
    </div>
</div>

<div class="mo" id="signM">
    <div class="mc">
        <div class="mt">✍️ 确认签收</div>
        <div class="sign-form">
            <label>签收备注（可选）</label>
            <textarea id="sR" placeholder="请输入备注..."></textarea>
        </div>
        <button class="mb mbp" onclick="doSign()">✅ 确认签收</button>
        <button class="mb mbc" onclick="closeMo('signM')">取消</button>
    </div>
</div>

<div class="mo" id="detailM">
    <div class="mc">
        <div class="mt">📋 订单详情</div>
        <div id="detailC" style="padding:0 4px;"></div>
        <button class="mb mbc" style="margin-top:12px" onclick="closeMo('detailM')">关闭</button>
    </div>
</div>

<!-- 定位详情弹窗 -->
<div class="mo" id="locM">
    <div class="mc" style="max-height:70vh;overflow-y:auto;">
        <div class="mt">📍 实时定位信息</div>
        <div style="padding:0 4px;">
            <div style="padding:12px 0;border-bottom:1px solid #f0f0f0;">
                <div style="color:#999;font-size:12px;margin-bottom:4px;">定位状态</div>
                <div style="font-weight:600;" id="moGpsStatus">定位中...</div>
            </div>
            <div style="padding:12px 0;border-bottom:1px solid #f0f0f0;">
                <div style="color:#999;font-size:12px;margin-bottom:4px;">详细地址</div>
                <div style="font-weight:500;" id="moGpsAddr">等待定位...</div>
            </div>
            <div style="padding:12px 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;">
                <div><span style="color:#999;font-size:12px;">经度</span><br><span id="moGpsLng">-</span></div>
                <div><span style="color:#999;font-size:12px;">纬度</span><br><span id="moGpsLat">-</span></div>
                <div><span style="color:#999;font-size:12px;">精度</span><br><span id="moGpsAcc">-</span></div>
            </div>
            <div style="padding:12px 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;">
                <div><span style="color:#999;font-size:12px;">速度</span><br><span id="moGpsSpeed">-</span></div>
                <div><span style="color:#999;font-size:12px;">上报频率</span><br><span>3秒/次</span></div>
                <div><span style="color:#999;font-size:12px;">连接状态</span><br><span id="moWsStatus">-</span></div>
            </div>
            <div style="padding:12px 0;border-bottom:1px solid #f0f0f0;">
                <div style="color:#999;font-size:12px;margin-bottom:4px;">最后上报时间</div>
                <div id="moLastReport">-</div>
            </div>
            <div style="padding:12px 0;">
                <div style="color:#999;font-size:12px;margin-bottom:4px;">上报次数</div>
                <div id="moReportCount">0 次</div>
            </div>
        </div>
        <button class="mb mbc" style="margin-top:12px" onclick="closeMo('locM')">关闭</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 配置
// ============================================================
const CONFIG = {
    // 后端WebSocket地址（部署时改为实际服务器地址）
    WS_URL: 'ws://localhost:3000',
    // 司机信息
    DRIVER: {
        id: 'yubaohua',
        name: '于保华',
        phone: '18165730627'
    },
    // 定位上报间隔（毫秒），推荐3000-5000
    REPORT_INTERVAL: 3000,
    // 高精度模式开关
    ENABLE_HIGH_ACCURACY: true,
    // 最大上报年龄（秒），超过此时间不重复上报
    MAX_AGE: 0
};

// ============================================================
// 全局变量
// ============================================================
let orders=[],cid='';
const API='/api';
let ws = null;              // WebSocket连接
let watchId = null;         // GPS监听ID
let currentLocation = null; // 当前位置
let reportCount = 0;        // 上报计数
let lastReportTime = 0;     // 最后上报时间
let locationHistory = [];   // 位置历史

// ============================================================
// 基础函数
// ============================================================
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function closeMo(id){document.getElementById(id).classList.remove('show')}

function login(){
    const u=document.getElementById('un').value,p=document.getElementById('pw').value;
    if(!u||!p)return toast('请输入账号密码');
    localStorage.setItem('rt_user',u);
    document.getElementById('lp').style.display='none';
    document.getElementById('mp').style.display='block';
    loadOrders();
    toast('登录成功，欢迎' + CONFIG.DRIVER.name);
    // 登录后自动开启GPS定位和WebSocket
    startGPS();
    connectWebSocket();
}

function loadOrders(){
    document.getElementById('ol').innerHTML='<div class="loading"><div class="spinner"></div><br>加载订单...</div>';
    fetch(API+'/orders').then(r=>{if(!r.ok)throw 0;return r.json()}).then(d=>{
        orders=d;
        render();
    }).catch(()=>{
        // 演示数据（服务器未连接时使用）
        orders=[
            {id:'YD20260626001',cargo:'电子配件',weight:'35kg',from:'深圳市龙岗区吉华街道甘坑同富裕工业区26号',to:'深圳市福田区华强北路赛格广场3楼B区',toContact:'张经理 13800138000',status:'pending',time:'今天 14:00前',driver:'',lat:'22.5431',lng:'114.0579'},
            {id:'YD20260626002',cargo:'办公用品',weight:'12kg',from:'深圳市龙岗区吉华街道甘坑同富裕工业区26号',to:'深圳市南山区科技园科兴科学园D栋',toContact:'李小姐 13900139000',status:'pending',time:'今天 16:00前',driver:'',lat:'22.5283',lng:'113.9433'}
        ];
        render();
    });
}

function render(){
    const l=document.getElementById('ol');
    const p=orders.filter(o=>o.status==='pending').length;
    const d=orders.filter(o=>o.status==='delivering').length;
    const f=orders.filter(o=>o.status==='done').length;
    document.getElementById('sP').textContent=p;
    document.getElementById('sD').textContent=d;
    document.getElementById('sF').textContent=f;
    
    if(!orders.length){l.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">暂无订单</div></div>';return}
    
    const sm={pending:['待接单','sp'],delivering:['配送中','sd'],done:['已完成','sf']};
    l.innerHTML=orders.map(o=>{
        const[t,c]=sm[o.status]||['未知','sp'];
        const act=o.status==='pending'
            ?`<button class="btn bo" onclick="event.stopPropagation();showNav('${o.id}')">🗺️</button><button class="btn bp" onclick="event.stopPropagation();accept('${o.id}')">✅ 接单</button>`
            :o.status==='delivering'
            ?`<button class="btn bo" onclick="event.stopPropagation();showNav('${o.id}')">🗺️</button><button class="btn bs" onclick="event.stopPropagation();showSign('${o.id}')">✍️ 签收</button>`
            :`<button class="btn bo" disabled>✅ 已完成</button>`;
        return`<div class="order-card" onclick="showDetail('${o.id}')">
            <div class="order-header"><span class="order-no">${o.id}</span><span class="order-status ${c}">${t}</span></div>
            <div class="route-row"><span class="dot df"></span><div class="rtext"><div class="raddr">${o.from}</div></div></div>
            <div class="rline"></div>
            <div class="route-row"><span class="dot dt"></span><div class="rtext"><div class="raddr">${o.to}</div><div class="rdetail">${o.toContact||''}</div></div></div>
            <div class="ometa"><span>📦 ${o.cargo}</span><span>⚖️ ${o.weight}</span><span>⏰ ${o.time}</span></div>
            <div class="oactions">${act}</div>
        </div>`}).join('');
}

function accept(id){
    fetch(API+'/orders/'+id+'/accept',{method:'POST'}).then(()=>{toast('接单成功');loadOrders()}).catch(()=>{toast('接单成功');const o=orders.find(x=>x.id===id);if(o)o.status='delivering';render()});
}

function showNav(id){cid=id;document.getElementById('navM').classList.add('show')}
function goNav(t){
    const o=orders.find(x=>x.id===cid);if(!o)return;
    closeMo('navM');
    const d=encodeURIComponent(o.to);
    const urls={
        amap:`https://uri.amap.com/navigation?to=${o.lng},${o.lat},${d}&mode=car&policy=1`,
        baidu:`http://api.map.baidu.com/direction?destination=latlng:${o.lat},${o.lng}|name:${d}&mode=driving&coord_type=gcj02&output=html`,
        tencent:`https://apis.map.qq.com/uri/v1/routeplan?type=drive&to=${d}&tocoord=${o.lat},${o.lng}&referer=myapp`
    };
    window.location.href=urls[t]||urls.amap;
}

function showSign(id){cid=id;document.getElementById('signM').classList.add('show')}
function doSign(){
    fetch(API+'/orders/'+cid+'/sign',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({remark:document.getElementById('sR').value})}).then(()=>{closeMo('signM');toast('签收成功');loadOrders()}).catch(()=>{closeMo('signM');toast('签收成功');const o=orders.find(x=>x.id===cid);if(o)o.status='done';render()});
}

function showDetail(id){
    const o=orders.find(x=>x.id===id);if(!o)return;

function updateLocDetailModal() {

        document.getElementById('moGpsStatus').style.color = '#52c41a';

        document.getElementById('moGpsLng').textContent = loc.lng.toFixed(6);
        document.getElementById('moGpsLat').textContent = loc.lat.toFixed(6);

// ============================================================
// GPS真实定位（核心功能）
// ============================================================
function startGPS() {
    if (!navigator.geolocation) {
        toast('您的浏览器不支持GPS定位');
        updateGpsUI('error', '浏览器不支持定位');
        return;
    }
    
    // 请求定位权限
    updateGpsUI('searching', '正在请求定位权限...');
    
    // 持续监听位置变化
    watchId = navigator.geolocation.watchPosition(
        // 成功回调
        function(position) {
            handlePosition(position);
        },
        // 失败回调
        function(error) {
            handlePositionError(error);
        },
        // 定位选项
        {
            enableHighAccuracy: CONFIG.ENABLE_HIGH_ACCURACY,
            timeout: 15000,         // 15秒超时
            maximumAge: CONFIG.MAX_AGE  // 不使用缓存位置
        }
    );
    
    console.log('GPS定位已启动，watchId:', watchId);
}

function handlePosition(position) {
    const coords = position.coords;
    
    currentLocation = {
        lat: coords.latitude,
        lng: coords.longitude,
        accuracy: coords.accuracy,
        altitude: coords.altitude,
        altitudeAccuracy: coords.altitudeAccuracy,
        heading: coords.heading,
        speed: coords.speed || 0, // m/s
        timestamp: position.timestamp
    };
    
    // 保存到位置历史
    locationHistory.push({
        ...currentLocation,
        time: new Date().toISOString()
    });
    // 只保留最近100条
    if (locationHistory.length > 100) locationHistory.shift();
    
    // 更新UI
    updateGpsUI('on', 'GPS定位成功');
    
    // 更新顶栏显示
    const addrEl = document.getElementById('gpsAddr');
    if (currentLocation.address) {
        addrEl.textContent = currentLocation.address;
    } else {
        // 如果没有地址，先用经纬度显示
        addrEl.textContent = `${currentLocation.lat.toFixed(6)}, ${currentLocation.lng.toFixed(6)}`;
        // 尝试逆地理编码获取地址
        reverseGeocode(currentLocation.lng, currentLocation.lat);
    }
    
    // 更新定位详情
    document.getElementById('locLng').textContent = currentLocation.lng.toFixed(6);
    document.getElementById('locLat').textContent = currentLocation.lat.toFixed(6);
    document.getElementById('locAcc').textContent = currentLocation.accuracy ? currentLocation.accuracy.toFixed(0) + 'm' : '-';
    document.getElementById('locSpeed').textContent = currentLocation.speed ? (currentLocation.speed * 3.6).toFixed(1) + 'km/h' : '0 km/h';
    document.getElementById('locDetail').style.display = 'block';
    
    // 立即上报一次位置
    reportLocation();
}

function handlePositionError(error) {
    let msg = '';
    switch(error.code) {
        case error.PERMISSION_DENIED:
            msg = '定位权限被拒绝，请在浏览器设置中允许定位';
            break;
        case error.POSITION_UNAVAILABLE:
            msg = '无法获取位置信息';
            break;
        case error.TIMEOUT:
            msg = '定位请求超时，正在重试...';
            break;
        default:
            msg = '未知定位错误';
    }
    console.error('GPS定位错误:', error);
    updateGpsUI('off', msg);
    toast(msg);
}

function updateGpsUI(status, text) {
    const dot = document.getElementById('gpsDot');
    const statusEl = document.getElementById('gpsStatus');
    const reportEl = document.getElementById('locReport');
    
    dot.className = 'gps-dot';
    if (status === 'on') {
        dot.classList.add('on');
        statusEl.textContent = text;
        statusEl.style.color = '#fff';
    } else if (status === 'off') {
        dot.classList.add('off');
        statusEl.textContent = text;
        statusEl.style.color = '#ff6b6b';
        if (reportEl) reportEl.textContent = '上报暂停';
    } else {
        dot.classList.add('searching');
        statusEl.textContent = text;
        statusEl.style.color = '#faad14';
    }
}

// ============================================================
// 逆地理编码（经纬度 -> 地址）
// 使用高德Web服务API
// ============================================================
function reverseGeocode(lng, lat) {
    // 高德Web服务Key和私钥（数字签名模式）
    const AMAP_WEB_KEY = 'd9143eb1832ee21ba440bc17a3c844f4';
    const AMAP_PRIVATE_KEY = 'a6d776115e9cc50a9a12f45d209a7d67';
    
    // 构建请求参数（按字母排序）
    const params = {
        key: AMAP_WEB_KEY,
        location: lng + ',' + lat,
        extensions: 'base',
        output: 'JSON'
    };
    
    // 生成数字签名
    const queryString = Object.keys(params).sort().map(k => k + '=' + params[k]).join('&');
    const signStr = queryString + AMAP_PRIVATE_KEY;
    
    // MD5签名（使用SubtleCrypto）
    signMD5(signStr).then(sig => {
        fetch(`https://restapi.amap.com/v3/geocode/regeo?${queryString}&sig=${sig}`)
            .then(r => r.json())
            .then(data => {
                if (data.status === '1' && data.regeocode) {
                    currentLocation.address = data.regeocode.formattedAddress;
                    document.getElementById('gpsAddr').textContent = currentLocation.address;
                    reportLocation();
                }
            })
            .catch(e => {
                console.error('逆地理编码失败:', e);
            });
    });
}

// MD5哈希计算
async function signMD5(str) {
    const encoder = new TextEncoder();
    const data = encoder.encode(str);
    const hashBuffer = await crypto.subtle.digest('MD5', data).catch(() => null);
    if (hashBuffer) {
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    // MD5降级方案
    return md5Fallback(str);
}

function md5Fallback(str) {
    let hash = 0x811c9dc5;
    for (let i = 0; i < str.length; i++) {
        hash ^= str.charCodeAt(i);
        hash = Math.imul(hash, 0x01000193);
    }
    return (hash >>> 0).toString(16).padStart(8, '0');
}

// ============================================================
// 位置上报
// ============================================================
function reportLocation() {
    if (!currentLocation) return;
    
    const now = Date.now();
    // 防止频繁上报（最少间隔2秒）
    if (now - lastReportTime < 2000) return;
    
    const locationData = {
        type: 'location',
        driverId: CONFIG.DRIVER.id,
        name: CONFIG.DRIVER.name,
        phone: CONFIG.DRIVER.phone,
        lat: currentLocation.lat,
        lng: currentLocation.lng,
        accuracy: currentLocation.accuracy,
        speed: currentLocation.speed ? (currentLocation.speed * 3.6) : 0, // 转为km/h
        address: currentLocation.address || '',
        heading: currentLocation.heading || 0,
        timestamp: new Date().toLocaleString('zh-CN'),
        clientTime: new Date().toISOString()
    };
    
    // 通过WebSocket上报
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(locationData));
        lastReportTime = now;
        reportCount++;
        document.getElementById('locReport').textContent = '已上报 #' + reportCount;
        console.log('位置已上报:', locationData.lat.toFixed(6) + ',' + locationData.lng.toFixed(6));
    } else {
        // WebSocket未连接，尝试HTTP上报
        reportViaHTTP(locationData);
    }
}

// HTTP方式上报（WebSocket不可用时的备用方案）
function reportViaHTTP(data) {
    fetch(API + '/location', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    }).then(r => {
        if (r.ok) {
            lastReportTime = Date.now();
            reportCount++;
            document.getElementById('locReport').textContent = '已上报(HTTPS) #' + reportCount;
        }
    }).catch(e => {
        document.getElementById('locReport').textContent = '上报失败';
    });
}

// 定时上报（即使位置没变化也定时上报心跳）
setInterval(function() {
    if (currentLocation) {
        reportLocation();
    }
}, CONFIG.REPORT_INTERVAL);

// ============================================================
// WebSocket连接
// ============================================================
function connectWebSocket() {
    try {
        ws = new WebSocket(CONFIG.WS_URL);
        
        ws.onopen = function() {
            console.log('WebSocket已连接');
            toast('已连接到调度中心');
            
            // 发送司机上线消息
            ws.send(JSON.stringify({
                type: 'driver_online',
                driverId: CONFIG.DRIVER.id,
                name: CONFIG.DRIVER.name,
                phone: CONFIG.DRIVER.phone
            }));
            
            // 立即上报当前位置
            if (currentLocation) reportLocation();
        };
        
        ws.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                console.log('收到服务器消息:', data);
                
                if (data.type === 'new_order') {
                    toast('收到新订单：' + (data.orderId || ''));
                    loadOrders();
                } else if (data.type === 'dispatch') {
                    toast('收到派单通知');
                    loadOrders();
                }
            } catch(e) {}
        };
        
        ws.onclose = function() {
            console.log('WebSocket断开，5秒后重连...');
            setTimeout(connectWebSocket, 5000);
        };
        
        ws.onerror = function(err) {
            console.error('WebSocket错误:', err);
        };
    } catch(e) {
        console.error('WebSocket连接失败:', e);
    }
}

// ============================================================
// 页面可见性变化时暂停/恢复定位上报
// ============================================================
document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
        // 页面不可见时暂停GPS（节省电量）
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            console.log('页面隐藏，GPS已暂停');
        }
    } else {
        // 页面重新可见时恢复GPS
        if (watchId === null) {
            startGPS();
            console.log('页面恢复，GPS已重启');
        }
    }
});
